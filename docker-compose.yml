version: '3.8'

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: aetheros-socket-proxy
    restart: always
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - NODES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aether-net

  aetheros-dashboard:
    build: .
    container_name: aetheros-dashboard
    restart: always
    ports:
      - "5175:5175"
    depends_on:
      - docker-socket-proxy
    volumes:
      - ./chat_history.json:/app/chat_history.json
      - ./example-store:/app/example-store
    environment:
      - PORT=5175
      - NODE_ENV=production
      - DOCKER_HOST=http://docker-socket-proxy:2375
    networks:
      - aether-net

  aetheros-updater:
    build: ./updater
    container_name: aetheros-updater
    restart: always
    depends_on:
      - docker-socket-proxy
    volumes:
      # Map the full host repository to /app so the updater can manipulate git files natively
      - ./:/app
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
      - aether-net

networks:
  aether-net:
    driver: bridge

